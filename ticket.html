<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar custom-card mb-4 px-3 sticky-top">
        <a href="dashboard.html" class="navbar-brand text-decoration-none h1 mb-0"><i class="fas fa-arrow-left me-2"></i> Back</a>
        <button id="theme-toggle-btn" class="theme-toggle me-3"><i id="theme-icon" class="fas fa-moon"></i></button>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <h2 class="mb-4 text-center">Booking Confirmed 🎉</h2>
                <div id="ticketBox">
                    <div class="text-center py-5"><span class="spinner-border text-primary"></span></div>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button class="btn btn-primary btn-lg" id="downloadBtn"><i class="fas fa-download me-2"></i>Download Ticket (PDF)</button>
                    <a href="#" id="trackBtn" class="btn btn-outline-primary btn-lg"><i class="fas fa-location-crosshairs me-2"></i>Track Live Queue</a>
                    <button class="btn btn-outline-danger" id="cancelTicketBtn">Cancel Ticket</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/ticket.js"></script>
</body>
</html>

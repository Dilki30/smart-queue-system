<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar custom-card mb-4 px-3 sticky-top">
        <a href="dashboard.html" class="navbar-brand text-decoration-none h1 mb-0"><i class="fas fa-arrow-left me-2"></i> Back</a>
        <button id="theme-toggle-btn" class="theme-toggle me-3"><i id="theme-icon" class="fas fa-moon"></i></button>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h2 class="mb-4">My Profile</h2>
                <div class="custom-card p-4">
                    <form id="profileForm">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">Name</label><input type="text" class="form-control custom-input" id="name" required></div>
                            <div class="col-md-6"><label class="form-label">Phone</label><input type="tel" class="form-control custom-input" id="phone"></div>
                            <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control custom-input" id="email" disabled></div>

                            <div class="col-12 mt-4"><h5>Update Password</h5></div>
                            <div class="col-md-6"><label class="form-label">Current Password</label><input type="password" class="form-control custom-input" id="currentPassword"></div>
                            <div class="col-md-6"></div>
                            <div class="col-md-6"><label class="form-label">New Password</label><input type="password" class="form-control custom-input" id="newPassword"></div>
                            <div class="col-md-6"><label class="form-label">Confirm Password</label><input type="password" class="form-control custom-input" id="confirmNewPassword"></div>
                        </div>
                        <div class="d-flex justify-content-end mt-4"><button type="submit" class="btn btn-primary">Save Changes</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>

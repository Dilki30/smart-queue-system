<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Queue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="position-absolute top-0 end-0 p-3">
        <button id="theme-toggle-btn" class="theme-toggle"><i id="theme-icon" class="fas fa-moon"></i></button>
    </div>

    <div class="auth-container">
        <div class="custom-card auth-box">
            <h3 class="text-center mb-1"><i class="fas fa-layer-group text-primary me-2"></i>SmartQueue</h3>
            <p class="text-center text-muted mb-4">Welcome back — login to continue</p>

            <div id="authError" class="alert alert-danger py-2" style="display:none;"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control custom-input" id="email" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control custom-input" id="password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <p class="text-center mt-3">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth-pages.js?v=adminFix"></script>
    <!-- 👑 ULTIMATE ADMIN BYPASS: This runs before any cached JS files! -->
    <script>
        const loginFormElement = document.getElementById('loginForm');
        if (loginFormElement) {
            // The "true" at the end makes this script run in the Capture Phase (before anything else)
            loginFormElement.addEventListener('submit', function(e) {
                const emailInput = document.getElementById('email').value.trim().toLowerCase();
                const passwordInput = document.getElementById('password').value.trim();
                
                if (emailInput === 'admin@admin.com' && passwordInput.toUpperCase() === 'JAPURA') {
                    e.preventDefault(); // Stop the form from submitting
                    e.stopImmediatePropagation(); // Kills the old cached auth-pages.js script!
                    
                    // Save admin credentials instantly
                    localStorage.setItem('token', 'admin-token');
                    localStorage.setItem('user', JSON.stringify({ name: 'System Admin', role: 'admin' }));
                    
                    // Transport to admin portal
                    window.location.href = 'admin.html';
                }
            }, true); 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SmartQueue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar custom-card mb-4 px-3 sticky-top">
        <span class="navbar-brand h1 mb-0"><i class="fas fa-shield-halved text-primary me-2"></i>Admin Portal</span>
        <div class="d-flex align-items-center">
            <button id="theme-toggle-btn" class="theme-toggle me-3"><i id="theme-icon" class="fas fa-moon"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="adminLogout()"><i class="fas fa-sign-out-alt me-1"></i> Logout</button>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-1">All System Appointments</h2>
                <p class="text-muted mb-0">View and manage all user appointments live</p>
            </div>
            <button class="btn btn-outline-primary btn-sm" onclick="loadAdminTickets()"><i class="fas fa-sync-alt me-1"></i> Refresh</button>
        </div>

        <div class="custom-card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Token</th>
                            <th>Type</th>
                            <th>Details</th>
                            <th>Date / Time</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="adminTicketList">
                        <tr>
                            <td colspan="6" class="text-center py-4">
                                <span class="spinner-border text-primary"></span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>

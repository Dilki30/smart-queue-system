<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar custom-card mb-4 px-3 sticky-top">
        <span class="navbar-brand h1 mb-0"><i class="fas fa-layer-group text-primary me-2"></i>SmartQueue</span>
        <div class="d-flex align-items-center">
            <button id="theme-toggle-btn" class="theme-toggle me-4"><i id="theme-icon" class="fas fa-moon"></i></button>
            <a href="profile.html" class="me-3 text-secondary"><i class="fas fa-user-circle fs-4"></i></a>
            <a href="#" id="logoutBtn" class="btn btn-sm btn-outline-danger">Logout</a>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="mb-4">Welcome, <span id="welcomeName">👋</span></h2>

        <div id="activeTicketBox" class="custom-card p-4 mb-4 border-primary border-start border-4" style="display:none;"></div>

        <div class="row g-4 mb-4">
            <div class="col-md-4"><div class="custom-card stat-card"><h6>Total Appointments</h6><h3 id="statTotal">0</h3></div></div>
            <div class="col-md-4"><div class="custom-card stat-card" style="border-left-color: #198754;"><h6>Completed</h6><h3 id="statCompleted">0</h3></div></div>
            <div class="col-md-4"><div class="custom-card stat-card" style="border-left-color: #ffc107;"><h6>Waiting</h6><h3 id="statWaiting">0</h3></div></div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="custom-card p-4 text-center h-100 d-flex flex-column justify-content-center">
                    <h5>Need a new slot?</h5>
                    <p class="text-muted small">Hospital appointments or bank service tickets</p>
                    <a href="booking.html" class="btn btn-primary mt-2">Book Appointment</a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="custom-card p-4 text-center h-100 d-flex flex-column justify-content-center">
                    <h5>View your live position</h5>
                    <a href="queue.html" class="btn btn-outline-primary mt-2">Track Queue</a>
                    <a href="history.html" class="mt-3 text-decoration-none">View History</a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

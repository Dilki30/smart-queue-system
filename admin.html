<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SmartQueue</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0"><i class="fas fa-shield-halved text-primary me-2"></i>Admin Portal</h2>
                <p class="text-muted small">Viewing all system appointments</p>
            </div>
            <button class="btn btn-outline-danger" onclick="adminLogout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Token</th>
                                <th>Type</th>
                                <th>Details</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="adminTicketList">
                            <tr>
                                <td colspan="5" class="text-center py-4">
                                    <span class="spinner-border text-primary"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        function adminLogout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>

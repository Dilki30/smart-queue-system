<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Queue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar custom-card mb-4 px-3 sticky-top">
        <a href="dashboard.html" class="navbar-brand text-decoration-none h1 mb-0"><i class="fas fa-arrow-left me-2"></i> Back</a>
        <button id="theme-toggle-btn" class="theme-toggle me-3"><i id="theme-icon" class="fas fa-moon"></i></button>
    </nav>

    <div class="container text-center pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div id="pickerView" style="display:none; text-align:left;"></div>

                <div id="trackerView" style="display:none;">
                    <div class="custom-card p-4 mb-4 border-primary border-top border-5">
                        <h4 class="text-muted">Your Token</h4>
                        <h1 class="display-1 fw-bold text-primary" id="myToken">—</h1>
                        <div class="row mt-4">
                            <div class="col-6"><h6>Position</h6><h3 id="myPosition">—</h3></div>
                            <div class="col-6"><h6>Est. Wait</h6><h3><span id="myWaitTime">—</span>m</h3></div>
                        </div>
                        <button class="btn btn-outline-primary mt-3" id="refreshBtn"><i class="fas fa-sync-alt me-2"></i> Refresh</button>
                    </div>

                    <div class="custom-card p-3" id="statusBanner">
                        <h5 class="mb-0">Now Serving: <span class="fw-bold fs-2 ms-2" id="nowServing">—</span></h5>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/queue.js"></script>
</body>
</html>

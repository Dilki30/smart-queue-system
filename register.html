<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Queue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="position-absolute top-0 end-0 p-3">
        <button id="theme-toggle-btn" class="theme-toggle"><i id="theme-icon" class="fas fa-moon"></i></button>
    </div>

    <div class="auth-container">
        <div class="custom-card auth-box">
            <h3 class="text-center mb-4">Create Account</h3>

            <div id="authError" class="alert alert-danger py-2" style="display:none;"></div>

            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control custom-input" id="name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control custom-input" id="email" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="tel" class="form-control custom-input" id="phone" placeholder="07XXXXXXXX">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control custom-input" id="password" required onkeyup="checkStrength()">
                    <div id="strengthBar" class="password-strength bg-secondary w-100"></div>
                    <small id="strengthText" class="text-muted mt-1 d-block">Minimum 8 characters.</small>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control custom-input" id="confirmPassword" required onkeyup="checkMatch()">
                    <div id="matchError" class="error-text">Passwords do not match.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <p class="text-center mt-3">Already have an account? <a href="login.html">Login here</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth-pages.js"></script>
</body>
</html>

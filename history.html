<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar custom-card mb-4 px-3 sticky-top">
        <a href="dashboard.html" class="navbar-brand text-decoration-none h1 mb-0"><i class="fas fa-arrow-left me-2"></i> Back</a>
        <button id="theme-toggle-btn" class="theme-toggle me-3"><i id="theme-icon" class="fas fa-moon"></i></button>
    </nav>

    <div class="container pb-5">
        <h2 class="mb-4">Appointment History</h2>
        <div class="custom-card p-4">
            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle mb-0">
                    <thead>
                        <tr><th>Token</th><th>Type</th><th>Details</th><th>Date</th><th>Status</th><th></th></tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="6" class="text-center py-4"><span class="spinner-border text-primary"></span></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/history.js"></script>
</body>
</html>
